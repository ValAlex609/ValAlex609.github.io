<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman Game</title>
  <link rel="stylesheet" href="css/css-file.css" />
</head>
<body>

  <div id="container">
    <h1>Hangman</h1>

    <div id="hint-area"></div>

    <div id="lives-counter"></div>

    <div id="word-display"></div>

    <div id="keyboard"></div>

    <div id="message"></div>

    <div id="wrong-letters-area">
      <span>Wrong guesses: </span>
      <span id="wrong-letters"></span>
    </div>

    <button id="restart-btn">New Game</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
